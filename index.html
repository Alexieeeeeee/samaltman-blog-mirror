const PER_PAGE = 10;
let currentPage = 1;

function renderPage(page) {
    currentPage = page;
    const start = (page - 1) * PER_PAGE;
    const end = Math.min(start + PER_PAGE, posts.length);
    const pagePosts = posts.slice(start, end);
    const totalPages = Math.ceil(posts.length / PER_PAGE);

    const listEl = document.getElementById('posts-list');
    listEl.innerHTML = pagePosts.map(function(p) {
        return '<a href="' + p.url + '" class="post-item">' +
            '<div class="post-title">' + p.title + '</div>' +
            '<div class="post-date">' + p.date + '</div>' +
            '<div class="post-excerpt">' + p.excerpt + '</div>' +
            '</a>';
    }).join('');

    const pagEl = document.getElementById('pagination');
    let pagHtml = '';
    if (page > 1) pagHtml += '<a href="#" class="page-link" data-page="' + (page - 1) + '">上一页</a> ';
    for (let i = 1; i <= totalPages; i++) {
        if (i === page) {
            pagHtml += '<span class="page-link page-active">' + i + '</span> ';
        } else {
            pagHtml += '<a href="#" class="page-link" data-page="' + i + '">' + i + '</a> ';
        }
    }
    if (page < totalPages) pagHtml += ' <a href="#" class="page-link" data-page="' + (page + 1) + '">下一页</a>';
    pagEl.innerHTML = pagHtml;

    pagEl.querySelectorAll('.page-link[data-page]').forEach(function(a) {
        a.addEventListener('click', function(e) {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderPage(parseInt(a.dataset.page));
        });
    });
}

renderPage(1);
</script>
